<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans','Segoe UI',Arial,sans-serif;background:#f1f8e9;min-height:100vh}
.card{background:white;border-radius:16px;box-shadow:0 3px 20px rgba(0,0,0,.08)}
.if{transition:border-color .2s,box-shadow .2s}
.if:focus{outline:none;border-color:var(--ac,#2e7d32)!important;box-shadow:0 0 0 3px rgba(46,125,50,.15)!important}
.bg{transition:background .2s,transform .1s}
.bg:hover:not(:disabled){filter:brightness(.88);transform:translateY(-1px)}
.ch{transition:all .15s;cursor:pointer}.ch:hover{transform:translateY(-1px);filter:brightness(.93)}
.gr{animation:sD .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes sD{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.bf{transition:width .9s cubic-bezier(.34,1.56,.64,1)}
.pu{animation:pu 1.2s ease infinite;display:inline-block}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.ce{animation:po .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes po{0%{transform:scale(.85)}70%{transform:scale(1.05)}100%{transform:scale(1)}}
.gw{box-shadow:0 0 0 3px rgba(0,200,83,.35),0 3px 20px rgba(46,125,50,.18)!important;border-color:#43a047!important}
.bfl{animation:bF 4s ease-in-out infinite}
@keyframes bF{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.gc{cursor:pointer;transition:transform .2s,box-shadow .2s}
.gc:hover{transform:translateY(-4px);box-shadow:0 10px 40px rgba(0,0,0,.15)}
#ls{position:fixed;inset:0;z-index:999;background:linear-gradient(160deg,#1b5e20,#2e7d32 60%,#1a5276);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;transition:opacity .6s}
#ls.hidden{opacity:0;pointer-events:none}
.pb{width:260px;height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin:16px auto 10px}
.pf{height:100%;background:#f9a825;border-radius:4px;transition:width .4s ease}
.cc{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border:1.5px solid #a5d6a7;border-radius:12px;padding:12px 16px;margin-bottom:8px;font-size:14px;color:#1b5e20;font-weight:600;line-height:1.5;animation:sD .4s cubic-bezier(.34,1.56,.64,1)}
</style>
</head>

const no=s=>s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const rc=r=>{if(!r&&r!==0)return'#cfd8dc';if(r===1)return'#00c853';if(r<=10)return'#1b5e20';if(r<=50)return'#2e7d32';if(r<=100)return'#388e3c';if(r<=200)return'#66bb6a';if(r<=350)return'#aed581';if(r<=500)return'#fdd835';if(r<=700)return'#ffa000';if(r<=1000)return'#f4511e';if(r<=1500)return'#c62828';return'#78909c';};
const hl=r=>{if(!r&&r!==0)return'avaliando...';if(r===1)return'🎯 ACERTOU!';if(r<=10)return'🔥 Fervendo!';if(r<=50)return'♨️ Muito quente';if(r<=100)return'🌡️ Quente';if(r<=200)return'☀️ Morno';if(r<=400)return'🌤️ Tepido';if(r<=700)return'💧 Frio';if(r<=1200)return'❄️ Gelado';return'🌑 Distante';};
const bw=r=>{if(!r)return 5;if(r===1)return 100;return Math.max(4,Math.round((1-Math.log(r)/Math.log(2001))*96+4));};
const s2r=s=>{const v=Math.max(0,Math.min(1,(s+1)/2));if(v>=0.999)return 1;return Math.max(1,Math.min(2000,Math.round(2000*Math.pow(1-v,1.6))));};

let EX=null;const EC={};
async function emb(t){if(EC[t])return EC[t];const o=await EX(t,{pooling:'mean',normalize:true});EC[t]=Array.from(o.data);return EC[t];}
async function cxR(s,g){const[eS,eG]=await Promise.all([emb(s),emb(g)]);return s2r(cos_sim(eS,eG));}
async function coR(w1,w2,g){const[e1,e2,eG]=await Promise.all([emb(w1),emb(w2),emb(g)]);return s2r((cos_sim(e1,eG)+cos_sim(e2,eG))/2);}

      </div>`:''}
      ${S.qa.length>0?`<div class="card" style="overflow:hidden">
        <div style="padding:11px 16px;border-bottom:1px solid #f0f0f0;background:#fafafa"><span style="font-size:11px;font-weight:700;color:#546e7a;letter-spacing:1.5px;text-transform:uppercase">Tentativas</span></div>
        ${atmHtml}</div>`:''}
    </div>
  </div>`;
  const i=document.getElementById('qi');if(i)i.focus();
}

/* ── RENDER CONEXAO ── */
function rCX(){
  const cx=S.co;
  document.getElementById('root').innerHTML=`<div style="min-height:100vh;background:linear-gradient(160deg,#fbe9e7,#fff3e0 60%,#fce4ec)">
    <div style="background:linear-gradient(135deg,#bf360c,#e65100,#ff6d00);padding:14px 20px">
      <div style="display:flex;align-items:center;gap:10px;max-width:620px;margin:0 auto">
        <button onclick="gh()" style="background:rgba(255,255,255,.15);color:white;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;font-weight:600">← Inicio</button>
        <div style="flex:1;text-align:center"><span style="font-size:20px">🔗</span><span style="font-family:'Fraunces',Georgia,serif;font-weight:900;font-size:18px;color:#ffe0b2;margin-left:8px">Conexao Ecologica</span></div>
        <div style="width:80px"></div>
      </div>
    </div>
    <div style="max-width:620px;margin:0 auto;padding:16px 14px 48px">
      <div class="card" style="padding:20px;margin-bottom:14px;border:2px solid #ffccbc">
        <div style="font-size:10px;font-weight:700;color:#e65100;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px">Qual palavra conecta estes dois termos?</div>
        <div style="display:flex;gap:12px;margin-bottom:14px">
          <div style="flex:1;background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:12px;padding:16px;text-align:center;font-size:17px;font-weight:800;color:#e65100">${cx.w1}</div>
          <div style="display:flex;align-items:center;font-size:22px;color:#e65100;font-weight:900;flex-shrink:0">+</div>
          <div style="flex:1;background:linear-gradient(135deg,#fbe9e7,#ffccbc);border-radius:12px;padding:16px;text-align:center;font-size:17px;font-weight:800;color:#e65100">${cx.w2}</div>
        </div>
        ${S.cl2?`<div style="text-align:center;padding:12px;background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:10px;border:1.5px solid #ffe082"><div style="font-size:11px;color:#f57f17;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px">Resposta</div><div style="font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:900;color:#e65100">${cx.secret}</div><div style="font-size:12px;color:#90a4ae;margin-top:4px">${cx.h}</div></div>`:`<div style="text-align:center;font-size:12px;color:#90a4ae">${S.cg.length} tentativa${S.cg.length!==1?'s':''} • Pista: "${cx.h}"</div>`}
      </div>
      ${S.cw?`<div class="ce" style="background:linear-gradient(135deg,#bf360c,#e65100);border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;color:white">
        <div style="font-size:28px;margin-bottom:6px">🔗</div>
        <div style="font-family:'Fraunces',Georgia,serif;font-size:18px;font-weight:700;margin-bottom:4px">Conexao encontrada em ${S.cg.length} tentativa${S.cg.length!==1?'s':''}!</div>
        <div style="font-size:12px;color:#ffe0b2;margin-bottom:14px">${cx.w1} + ${cx.w2} = <b>${cx.secret}</b></div>
        <button onclick="cxng()" style="background:#bf360c;color:white;border:none;border-radius:8px;padding:10px 26px;font-size:14px;font-weight:700;cursor:pointer">🔗 Nova Conexao</button>
      </div>`:''}
      ${!S.cw&&!S.cl2?`<div class="card" style="padding:16px;margin-bottom:14px">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <input id="cxi" class="if" placeholder="Digite a palavra que conecta os dois..." ${S.cld?'disabled':''} onkeydown="if(event.key==='Enter')cxg()" style="flex:1;padding:12px 16px;font-size:15px;border:2px solid #ffccbc;border-radius:10px;font-family:inherit;background:${S.cld?'#fafafa':'white'};color:#263238;--ac:#e65100"/>
          <button class="bg" onclick="cxg()" ${S.cld?'disabled':''} style="background:${S.cld?'#cfd8dc':'#e65100'};color:white;border:none;border-radius:10px;padding:12px 18px;font-size:18px;cursor:${S.cld?'not-allowed':'pointer'};font-weight:700;min-width:52px">${S.cld?'<span class="pu">⏳</span>':'→'}</button>
        </div>
        <div id="cxe" style="color:#e53935;font-size:12px;padding:4px 6px;margin-bottom:8px;display:none"></div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button class="ch" onclick="S.cl2=true;rCX()" style="background:#fff8e1;color:#e65100;border:1px solid #ffe082;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600">👁️ Revelar resposta</button>
          <button class="ch" onclick="cxng()" style="background:#fbe9e7;color:#bf360c;border:1px solid #ffccbc;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600">🔄 Nova Conexao</button>
        </div>
      </div>`:''}
      ${S.cg.length>0?`<div class="card" style="overflow:hidden">
        <div style="padding:11px 16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;background:#fafafa">
          <span style="font-size:11px;font-weight:700;color:#546e7a;letter-spacing:1.5px;text-transform:uppercase">Tentativas</span>
          <span style="font-size:12px;color:#90a4ae;font-weight:600">${S.cg.length} palavra${S.cg.length!==1?'s':''}</span>
        </div>${rRows(S.cg,'#e65100')}</div>`:''}
      ${S.cg.length===0&&!S.cw&&!S.cl2?`<div style="text-align:center;padding:32px 20px;color:#90a4ae">
        <div style="font-size:48px;margin-bottom:12px">🔗</div>
        <div style="font-size:16px;font-weight:700;color:#546e7a;margin-bottom:8px">Qual e a ligacao ecologica?</div>
        <div style="font-size:13px;line-height:1.7">Encontre a palavra que conecta os dois termos.<br/><span style="color:#ffab76">#1 = acertou! • #2000 = muito longe</span></div>
      </div>`:''}
    </div>
  </div>`;
  const i=document.getElementById('cxi');if(i)i.focus();
}

/* ── ACOES ── */
window.gh=()=>{S.sc='home';rHome();};

window.sg=async(id)=>{
  S.gid=id;const g=GD.find(x=>x.id===id);
  if(g.type==='ctx'){
    S.sc='ctx';S.sw=pk(WB[id]);S.gs=[];S.won=false;S.ld=false;S.hu=false;S.rc2=false;rCtx();
  }else if(id==='quem'){
    S.sc='qse';S.qo=pk(QSE);S.qcl=1;S.qa=[];S.qw=false;rQSE();
  }else if(id==='conexao'){
    S.sc='cx';S.co=pk(CX);S.cg=[];S.cw=false;S.cl2=false;S.cld=false;rCX();
  }
};

window.cg=async()=>{
  const inp=document.getElementById('ci'),raw=inp?inp.value.trim():'';
  if(!raw||S.ld||S.won)return;
  const n=no(raw);
  if(S.gs.some(g=>no(g.word)===n)){const e=document.getElementById('ce');if(e){e.textContent='⚠️ Ja tentada!';se('ce');}return;}
  S.ld=true;if(inp)inp.value='';rCtx();
  if(n===no(S.sw.w)){S.gs=[{word:raw,rank:1,done:true},...S.gs].sort((a,b)=>(a.rank??9999)-(b.rank??9999));S.won=true;S.ld=false;rCtx();return;}
  const pid=Date.now();S.gs.unshift({word:raw,rank:null,loading:true,pid});rCtx();
  try{const r=await cxR(S.sw.w,raw);S.gs=S.gs.filter(g=>g.pid!==pid);S.gs.push({word:raw,rank:r,done:true});S.gs.sort((a,b)=>(a.rank??9999)-(b.rank??9999));}
  catch{S.gs=S.gs.filter(g=>g.pid!==pid);}
  S.ld=false;rCtx();
};
window.cng=async()=>{S.sw=pkO(WB[S.gid],S.sw.w);S.gs=[];S.won=false;S.ld=false;S.hu=false;S.rc2=false;rCtx();};

window.qg=()=>{
  const inp=document.getElementById('qi'),raw=inp?inp.value.trim():'';
  if(!raw||S.qw)return;
  if(inp)inp.value='';
  const ok=no(raw)===no(S.qo.sp);
  S.qa.push({word:raw,ok});
  if(ok)S.qw=true;else if(S.qcl<5)S.qcl++;
  rQSE();
};
window.qmc=()=>{if(S.qcl<5)S.qcl++;rQSE();};
window.qng=()=>{S.qo=pkO(QSE,S.qo.sp);S.qcl=1;S.qa=[];S.qw=false;rQSE();};

window.cxg=async()=>{
  const inp=document.getElementById('cxi'),raw=inp?inp.value.trim():'';
  if(!raw||S.cld||S.cw)return;
  const n=no(raw);
  if(S.cg.some(g=>no(g.word)===n)){const e=document.getElementById('cxe');if(e){e.textContent='⚠️ Ja tentada!';se('cxe');}return;}
  S.cld=true;if(inp)inp.value='';
  const pid=Date.now();S.cg.unshift({word:raw,rank:null,loading:true,pid});rCX();
  try{
    let r;
    if(n===no(S.co.secret))r=1;else r=await coR(S.co.w1,S.co.w2,raw);
    S.cg=S.cg.filter(g=>g.pid!==pid);S.cg.push({word:raw,rank:r,done:true});S.cg.sort((a,b)=>(a.rank??9999)-(b.rank??9999));
    if(r===1)S.cw=true;
  }catch{S.cg=S.cg.filter(g=>g.pid!==pid);}
  S.cld=false;rCX();
};
window.cxng=async()=>{S.co=pkO(CX,S.co.secret);S.cg=[];S.cw=false;S.cl2=false;S.cld=false;rCX();};

/* ── BOOT ── */
const prog=document.getElementById('prog'),lmsg=document.getElementById('lmsg'),ls=document.getElementById('ls');
lmsg.textContent='Carregando modelo multilingual...';prog.style.width='8%';
EX=await pipeline('feature-extraction','Xenova/paraphrase-multilingual-MiniLM-L12-v2',{
  progress_callback:info=>{
    if(info.status==='progress'&&info.total){
      prog.style.width=Math.round((info.loaded/info.total)*85+8)+'%';
      lmsg.textContent=`Baixando... ${(info.loaded/1e6).toFixed(0)} MB`;
    }
  }
});
prog.style.width='100%';lmsg.textContent='Pronto! 🌿';
await new Promise(r=>setTimeout(r,500));
ls.classList.add('hidden');document.getElementById('root').style.display='block';
setTimeout(()=>ls.remove(),700);
rHome();
</script>
</body>
</html>

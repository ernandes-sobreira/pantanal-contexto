/* ─── HELPERS ───────────────────────────────────────────── */
const norm = s => s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

const rankColor = r => {
  if(!r&&r!==0) return "#cfd8dc";
  if(r===1)    return "#00c853";
  if(r<=10)    return "#1b5e20";
  if(r<=50)    return "#2e7d32";
  if(r<=100)   return "#388e3c";
  if(r<=200)   return "#66bb6a";
  if(r<=350)   return "#aed581";
  if(r<=500)   return "#fdd835";
  if(r<=700)   return "#ffa000";
  if(r<=1000)  return "#f4511e";
  if(r<=1500)  return "#c62828";
  return "#78909c";
};

const heatLabel = r => {
  if(!r&&r!==0) return "avaliando...";
  if(r===1)   return "🎯 ACERTOU!";
  if(r<=10)   return "🔥 Fervendo!";
  if(r<=50)   return "♨️ Muito quente";
  if(r<=100)  return "🌡️ Quente";
  if(r<=200)  return "☀️ Morno";
  if(r<=400)  return "🌤️ Tepido";
  if(r<=700)  return "💧 Frio";
  if(r<=1200) return "❄️ Gelado";
  return "🌑 Distante";
};

const barW = r => {
  if(!r) return 5;
  if(r===1) return 100;
  return Math.max(4, Math.round((1 - Math.log(r)/Math.log(2001))*96+4));
};

/* cosine similarity → rank 1-2000 */
function simToRank(sim) {
  // sim: -1..1, clamp to 0..1
  const s = Math.max(0, Math.min(1, (sim + 1) / 2));
  if(s >= 0.999) return 1;
  // exponential mapping: high similarity → low rank
  const rank = Math.round(2000 * Math.pow(1 - s, 1.6));
  return Math.max(1, Math.min(2000, rank));
}

/* ─── MODEL SETUP ───────────────────────────────────────── */
let extractor = null;
const embedCache = {};

async function getEmbedding(text) {
  if(embedCache[text]) return embedCache[text];
  const out = await extractor(text, { pooling:'mean', normalize:true });
  embedCache[text] = Array.from(out.data);
  return embedCache[text];
}

async function getSimilarityRank(secretWord, guessedWord) {
  const [eSecret, eGuess] = await Promise.all([
    getEmbedding(secretWord),
    getEmbedding(guessedWord)
  ]);
  const sim = cos_sim(eSecret, eGuess);
  return simToRank(sim);
}

      <div style="display:flex;align-items:center;justify-content:center;gap:12px">
        <span style="font-size:32px">🌿</span>
        <h1 style="font-family:'Fraunces',Georgia,serif;font-weight:900;font-size:clamp(22px,5vw,34px);color:#f9a825;letter-spacing:1.5px;text-shadow:0 2px 10px rgba(0,0,0,.35)">
          PANTANAL CONTEXTO
        </h1>
        <span style="font-size:32px">🐊</span>
      </div>
      <p style="margin-top:6px;color:#a5d6a7;font-size:13px;letter-spacing:0.5px">Descubra a palavra secreta do maior pantanal do mundo</p>
    </div>

    <div style="max-width:620px;margin:0 auto;padding:20px 14px 48px">

      <!-- Secret word -->
      <div class="card ${won?'glow':''}" style="padding:20px;text-align:center;margin-bottom:14px;border:2px solid ${won?'#43a047':'#e8f5e9'};background:${won?'linear-gradient(135deg,#f1f8e9,#e8f5e9)':'white'};transition:all .4s">
        <div style="font-size:10px;letter-spacing:2.5px;color:#90a4ae;text-transform:uppercase;margin-bottom:12px;font-weight:700">PALAVRA SECRETA</div>
        ${won
          ? `<div class="celebrate" style="font-family:'Fraunces',Georgia,serif;font-weight:900;font-size:clamp(24px,6vw,38px);color:#2e7d32;letter-spacing:3px">${swObj.word.toUpperCase()} 🎉</div>`
          : `<div style="display:flex;justify-content:center;flex-wrap:wrap;gap:2px">${boxes}</div>`
        }
        <div style="display:flex;justify-content:center;gap:24px;margin-top:14px;flex-wrap:wrap">
          <div style="text-align:center">
            <div style="font-size:22px;font-weight:800;color:#2e7d32;font-family:'Fraunces',Georgia,serif">${guesses.length}</div>
            <div style="font-size:10px;color:#90a4ae;letter-spacing:1px;text-transform:uppercase">Tentativas</div>
          </div>
          ${revCat?`<div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#f57f17">${swObj.category}</div><div style="font-size:10px;color:#90a4ae;letter-spacing:1px;text-transform:uppercase">Categoria</div></div>`:''}
          ${hintUsed?`<div style="text-align:center;max-width:180px"><div style="font-size:12px;font-weight:600;color:#7b1fa2;font-style:italic">"${swObj.hint}"</div><div style="font-size:10px;color:#90a4ae;letter-spacing:1px;text-transform:uppercase">Dica</div></div>`:''}
        </div>
      </div>

      ${won ? `
      <div class="celebrate" style="background:linear-gradient(135deg,#1b5e20,#2e7d32);border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;color:white">
        <div style="font-size:30px;margin-bottom:6px">🏆</div>
        <div style="font-family:'Fraunces',Georgia,serif;font-size:18px;font-weight:700;margin-bottom:4px">Você descobriu em ${guesses.length} tentativa${guesses.length!==1?'s':''}!</div>
        <div style="font-size:12px;color:#a5d6a7;margin-bottom:14px">Categoria: ${swObj.category} &bull; ${swObj.hint}</div>
        <button onclick="newGame()" style="background:#00695c;color:white;border:none;border-radius:8px;padding:10px 26px;font-size:14px;font-weight:700;cursor:pointer">🌿 Novo Jogo</button>
      </div>` : ''}

      <!-- Input -->
      ${!won ? `
      <div class="card" style="padding:16px;margin-bottom:14px">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <input id="guess-input" class="input-guess" value="" placeholder="Digite uma palavra do Pantanal..."
            ${loading?'disabled':''} onkeydown="if(event.key==='Enter')submitGuess()"
            style="flex:1;padding:12px 16px;font-size:15px;border:2px solid #e0e0e0;border-radius:10px;font-family:inherit;background:${loading?'#fafafa':'white'};color:#263238"/>
          <button class="btn-go" onclick="submitGuess()" ${loading?'disabled':''}
            style="background:${loading?'#cfd8dc':'#2e7d32'};color:white;border:none;border-radius:10px;padding:12px 18px;font-size:18px;cursor:${loading?'not-allowed':'pointer'};font-weight:700;min-width:52px">
            ${loading?'<span class="pulse">⏳</span>':'→'}
          </button>
        </div>
        <div id="error-msg" style="color:#e53935;font-size:12px;padding:4px 6px;margin-bottom:8px;display:none"></div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          ${!revCat?`<button class="chip" onclick="setRevCat()" style="background:#fff8e1;color:#f57f17;border:1px solid #ffe082;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600">🏷️ Ver Categoria</button>`:''}
          ${!hintUsed?`<button class="chip" onclick="setHint()" style="background:#f3e5f5;color:#7b1fa2;border:1px solid #ce93d8;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600">💡 Ver Dica</button>`:''}
          <button class="chip" onclick="newGame()" style="background:#e0f2f1;color:#00695c;border:1px solid #80cbc4;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600">🔄 Novo Jogo</button>
        </div>
      </div>` : ''}

      <!-- Guesses -->
      ${guesses.length>0 ? `
      <div class="card" style="overflow:hidden">
        <div style="padding:11px 16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;background:#fafafa">
          <span style="font-size:11px;font-weight:700;color:#546e7a;letter-spacing:1.5px;text-transform:uppercase">Suas Tentativas</span>
          <span style="font-size:12px;color:#90a4ae;font-weight:600">${guesses.length} palavra${guesses.length!==1?'s':''}</span>
        </div>
        ${guessRows}
      </div>` : ''}

      <!-- Empty state -->
      ${guesses.length===0&&!won ? `
      <div style="text-align:center;padding:36px 20px 20px">
        ${PantanalScene()}
        <div style="font-size:17px;font-weight:700;color:#546e7a;margin-bottom:8px;margin-top:18px">Comece a explorar o Pantanal!</div>
        <div style="font-size:13px;color:#90a4ae;line-height:1.7">
          Digite qualquer palavra relacionada ao Pantanal.<br/>
          Quanto menor o número, mais próxima da resposta!<br/>
          <span style="color:#81c784">#1 = acertou! &bull; #2000 = muito longe</span>
        </div>
        <div style="display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap">
          ${["capivara","onça","baía","pesca"].map(ex=>`
            <button class="chip" onclick="document.getElementById('guess-input').value='${ex}';document.getElementById('guess-input').focus()"
              style="background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600">${ex}?</button>
          `).join('')}
        </div>
      </div>` : ''}

      <div style="text-align:center;margin-top:28px">
        <p style="font-size:11px;color:#b0bec5">🌿 Pantanal Contexto — Ferramenta educativa &bull; ${WORD_BANK.length} palavras &bull; IA local, 100% gratuito</p>
      </div>
    </div>
  </div>`;

  if(!won) {
    const inp = document.getElementById('guess-input');
    if(inp) inp.focus();
  }
}

/* ─── GAME LOGIC ────────────────────────────────────────── */
function showError(msg) {
  const el = document.getElementById('error-msg');
  if(!el) return;
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  setTimeout(()=>{ el.style.display='none'; }, 2500);
}

window.setRevCat = () => { revCat = true; render(); };
window.setHint   = () => { hintUsed = true; render(); };

window.newGame = async () => {
  let n;
  do { n = WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)]; }
  while(n.word === swObj.word);
  swObj = n;
  secretEmbed = await extractor(swObj.word, { pooling:'mean', normalize:true }).then(o=>Array.from(o.data));
  guesses = []; won = false; loading = false; hintUsed = false; revCat = false;
  render();
};

window.submitGuess = async () => {
  const inp = document.getElementById('guess-input');
  const raw = inp ? inp.value.trim() : '';
  if(!raw || loading || won) return;
  const n = norm(raw);
  if(guesses.some(g => norm(g.word) === n)) {
    showError('Você já tentou essa palavra!');
    return;
  }
  loading = true;
  const pid = Date.now();
  guesses.unshift({ word: raw, rank: null, loading: true, pid });
  render();

  try {
    if(n === norm(swObj.word)) {
      guesses = guesses.filter(g=>g.pid!==pid);
      guesses.unshift({ word: raw, rank: 1, done: true });
      guesses.sort((a,b)=>(a.rank??9999)-(b.rank??9999));
      won = true;
    } else {
      const guessEmbed = Array.from(
        (await extractor(raw, { pooling:'mean', normalize:true })).data
      );
      const sim = cos_sim(secretEmbed, guessEmbed);
      const rank = simToRank(sim);
      guesses = guesses.filter(g=>g.pid!==pid);
      guesses.push({ word: raw, rank, done: true });
      guesses.sort((a,b)=>(a.rank??9999)-(b.rank??9999));
    }
  } catch(e) {
    guesses = guesses.filter(g=>g.pid!==pid);
    showError('Erro ao avaliar. Tente novamente.');
  } finally {
    loading = false;
    render();
  }
};

/* ─── BOOT ──────────────────────────────────────────────── */
const prog  = document.getElementById('prog');
const msg   = document.getElementById('load-msg');
const ls    = document.getElementById('loading-screen');

msg.textContent = 'Carregando modelo multilingual...';
prog.style.width = '10%';

extractor = await pipeline(
  'feature-extraction',
  'Xenova/paraphrase-multilingual-MiniLM-L12-v2',
  {
    progress_callback: info => {
      if(info.status === 'progress' && info.total) {
        const pct = Math.round((info.loaded / info.total) * 80) + 10;
        prog.style.width = pct + '%';
        const mb = (info.loaded / 1e6).toFixed(0);
        msg.textContent = `Baixando modelo... ${mb} MB`;
      }
    }
  }
);

prog.style.width = '95%';
msg.textContent = 'Preparando o jogo...';

// Pre-compute secret word embedding
secretEmbed = Array.from(
  (await extractor(swObj.word, { pooling:'mean', normalize:true })).data
);

prog.style.width = '100%';
msg.textContent = 'Pronto!';
await new Promise(r => setTimeout(r, 400));

ls.classList.add('hidden');
document.getElementById('root').style.display = 'block';
setTimeout(() => ls.remove(), 700);
render();
</script>
</body>
</html>

};

const barW = r => {

  return Math.max(4, Math.round((1 - Math.log(r)/Math.log(2001))*96+4));
};

/* ─── API ────────────────────────────────────────────────── */
async function getRank(secret, guess, apiKey) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key": apiKey, "anthropic-version":"2023-06-01" },
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:80,
      system:`Você é avaliador de similaridade para o jogo educativo "Pantanal Contexto".
Palavra secreta: "${secret}"
Palavra do jogador: "${guess}"
Avalie a proximidade semântica no contexto do ecossistema Pantanal (fauna, flora, hidrologia, cultura).
Retorne SOMENTE JSON: {"rank":<inteiro 1-2000>}
1=idêntica; 2-20=sinônimo/mesmo organismo; 21-100=mesma família ecológica; 101-300=mesmo bioma; 301-700=relacionada ao Pantanal; 701-1500=ligação fraca; 1501-2000=sem relação.
Retorne APENAS o JSON.`,
      messages:[{role:"user",content:"rank"}]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const txt = data.content.filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```[^\n]*\n?|```/g,"").trim();
  const {rank} = JSON.parse(txt);
  return Math.min(2000, Math.max(1, Math.round(rank)));
}

        </div>
        <p style={{fontSize:"13px",color:"#37474f",lineHeight:1.7,marginBottom:"16px"}}>
          Para jogar, informe sua chave de API Anthropic. Ela fica salva apenas na sua sessão do navegador e nunca é enviada a nenhum servidor além da Anthropic.
        </p>
        <input
          type="password"
          placeholder="sk-ant-..."
          value={val}
          onChange={e=>{setVal(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&confirm()}
          style={{width:"100%",padding:"11px 14px",fontSize:"14px",border:"2px solid #c8e6c9",borderRadius:"10px",marginBottom:"8px",fontFamily:"monospace"}}
        />
        {err && <p style={{color:"#e53935",fontSize:"12px",marginBottom:"8px"}}>⚠️ {err}</p>}
        <button
          onClick={()=>{
            if(!val.trim().startsWith("sk-ant-")){setErr("Chave inválida. Deve começar com sk-ant-");return;}
            sessionStorage.setItem("pc_key",val.trim());
            onSet(val.trim());
          }}
          style={{width:"100%",background:"#2e7d32",color:"white",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:700,cursor:"pointer"}}
        >
          Começar a jogar 🌿
        </button>
        <p style={{fontSize:"11px",color:"#90a4ae",marginTop:"12px",textAlign:"center"}}>
          Obtenha sua chave em{" "}
          <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:"#2e7d32"}}>console.anthropic.com</a>
        </p>
      </div>
    </div>
  );
}

/* ─── MAIN GAME ─────────────────────────────────────────── */
function App() {
  const savedKey = sessionStorage.getItem("pc_key") || "";
  const [apiKey,  setApiKey]  = useState(savedKey);
  const [swObj,   setSwObj]   = useState(()=>WORD_BANK[Math.floor(Math.random()*WORD_BANK.length)]);
  const [input,   setInput]   = useState("");
  const [guesses, setGuesses] = useState([]);
  const [won,     setWon]     = useState(false);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState("");
  const [hintUsed,setHintUsed]= useState(false);
  const [revCat,  setRevCat]  = useState(false);
  const inputRef = useRef(null);

  useEffect(()=>{ if(apiKey) setTimeout(()=>inputRef.current?.focus(),100); },[apiKey]);

  const guess = useCallback(async()=>{
    const raw = input.trim();
    if(!raw||loading||won) return;
    const n = norm(raw);
    if(guesses.some(g=>norm(g.word)===n)){
      setError("Você já tentou essa palavra!");
      setTimeout(()=>setError(""),2200);
      return;
    }
    setLoading(true); setInput(""); setError("");

    if(n===norm(swObj.word)){
      setGuesses(prev=>[{word:raw,rank:1,done:true},...prev].sort((a,b)=>(a.rank??9999)-(b.rank??9999)));
      setWon(true); setLoading(false); return;
    }

    const pid = Date.now();
    setGuesses(prev=>[{word:raw,rank:null,loading:true,pid},...prev]);
    try{
      const rank = await getRank(swObj.word, raw, apiKey);
      setGuesses(prev=>{
        const f = prev.filter(g=>g.pid!==pid);
        return [...f,{word:raw,rank,done:true}].sort((a,b)=>(a.rank??9999)-(b.rank??9999));
      });
    } catch(e){
      setGuesses(prev=>prev.filter(g=>g.pid!==pid));
      setError("Erro de conexão. Verifique sua chave e tente novamente.");
    } finally {
      setLoading(false);
      inputRef.current?.focus();
    }
  },[input,loading,won,guesses,swObj,apiKey]);

  const newGame = ()=>{
    let n; do{ n=WORD_BANK[Math.floor(Math.random()*WORD_BANK.length)]; } while(n.word===swObj.word);
    setSwObj(n); setGuesses([]); setWon(false); setLoading(false);
    setInput(""); setError(""); setHintUsed(false); setRevCat(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  /* letter boxes */
  const boxes = swObj.word.split("").map((ch,i)=>{
    const sep = ch==="-"||ch===" ";
    return (
      <div key={i} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
        width:sep?"16px":"34px",height:"42px",background:sep?"transparent":"#e8f5e9",
        border:sep?"none":"2px solid #a5d6a7",borderRadius:sep?0:"8px",margin:"0 2px",
        fontSize:"20px",color:"#b0bec5",fontWeight:700}}>
        {sep?(ch==="-"?"–":""):("?")}
      </div>
    );
  });

  if(!apiKey) return <ApiKeyOverlay onSet={k=>{sessionStorage.setItem("pc_key",k);setApiKey(k);}}/>;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#e8f5e9 0%,#f1f8e9 60%,#e0f2f1 100%)"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1b5e20 0%,#2e7d32 55%,#1a5276 100%)",padding:"22px 20px 18px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px"}}>
          <span style={{fontSize:"32px"}}>🌿</span>
          <h1 style={{fontFamily:"'Fraunces',Georgia,serif",fontWeight:900,fontSize:"clamp(22px,5vw,34px)",color:"#f9a825",letterSpacing:"1.5px",textShadow:"0 2px 10px rgba(0,0,0,.35)"}}>
            PANTANAL CONTEXTO
          </h1>
          <span style={{fontSize:"32px"}}>🐊</span>
        </div>
        <p style={{marginTop:"6px",color:"#a5d6a7",fontSize:"13px",letterSpacing:"0.5px"}}>
          Descubra a palavra secreta do maior pantanal do mundo
        </p>
      </div>

      <div style={{maxWidth:"620px",margin:"0 auto",padding:"20px 14px 48px"}}>

        {/* Secret word card */}
        <div className={`card ${won?"glow":""}`} style={{padding:"20px",textAlign:"center",marginBottom:"14px",border:`2px solid ${won?"#43a047":"#e8f5e9"}`,background:won?"linear-gradient(135deg,#f1f8e9,#e8f5e9)":"white",transition:"all .4s"}}>
          <div style={{fontSize:"10px",letterSpacing:"2.5px",color:"#90a4ae",textTransform:"uppercase",marginBottom:"12px",fontWeight:700}}>
            PALAVRA SECRETA
          </div>
          {won
            ? <div className="celebrate" style={{fontFamily:"'Fraunces',Georgia,serif",fontWeight:900,fontSize:"clamp(24px,6vw,38px)",color:"#2e7d32",letterSpacing:"3px"}}>
                {swObj.word.toUpperCase()} 🎉
              </div>
            : <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:"2px"}}>{boxes}</div>
          }
          <div style={{display:"flex",justifyContent:"center",gap:"24px",marginTop:"14px",flexWrap:"wrap"}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:"22px",fontWeight:800,color:"#2e7d32",fontFamily:"'Fraunces',Georgia,serif"}}>{guesses.length}</div>
              <div style={{fontSize:"10px",color:"#90a4ae",letterSpacing:"1px",textTransform:"uppercase"}}>Tentativas</div>
            </div>
            {revCat&&<div style={{textAlign:"center"}}>
              <div style={{fontSize:"14px",fontWeight:700,color:"#f57f17"}}>{swObj.category}</div>
              <div style={{fontSize:"10px",color:"#90a4ae",letterSpacing:"1px",textTransform:"uppercase"}}>Categoria</div>
            </div>}
            {hintUsed&&<div style={{textAlign:"center",maxWidth:"180px"}}>
              <div style={{fontSize:"12px",fontWeight:600,color:"#7b1fa2",fontStyle:"italic"}}>"{swObj.hint}"</div>
              <div style={{fontSize:"10px",color:"#90a4ae",letterSpacing:"1px",textTransform:"uppercase"}}>Dica</div>
            </div>}
          </div>
        </div>

        {/* Win banner */}
        {won&&(
          <div className="celebrate" style={{background:"linear-gradient(135deg,#1b5e20,#2e7d32)",borderRadius:"14px",padding:"18px",textAlign:"center",marginBottom:"14px",color:"white"}}>
            <div style={{fontSize:"30px",marginBottom:"6px"}}>🏆</div>
            <div style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:"18px",fontWeight:700,marginBottom:"4px"}}>
              Você descobriu em {guesses.length} tentativa{guesses.length!==1?"s":""}!
            </div>
            <div style={{fontSize:"12px",color:"#a5d6a7",marginBottom:"14px"}}>
              Categoria: {swObj.category} &bull; {swObj.hint}
            </div>
            <button onClick={newGame} className="header-btn" style={{background:"#00695c",color:"white",border:"none",borderRadius:"8px",padding:"10px 26px",fontSize:"14px",fontWeight:700,cursor:"pointer"}}>
              🌿 Novo Jogo
            </button>
          </div>
        )}

        {/* Input */}
        {!won&&(
          <div className="card" style={{padding:"16px",marginBottom:"14px"}}>
            <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
              <input
                ref={inputRef}
                value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&guess()}
                placeholder="Digite uma palavra do Pantanal..."
                disabled={loading}
                className="input-guess"
                style={{flex:1,padding:"12px 16px",fontSize:"15px",border:"2px solid #e0e0e0",borderRadius:"10px",fontFamily:"inherit",background:loading?"#fafafa":"white",color:"#263238"}}
              />
              <button onClick={guess} disabled={!input.trim()||loading} className="btn-go"
                style={{background:(!input.trim()||loading)?"#cfd8dc":"#2e7d32",color:"white",border:"none",borderRadius:"10px",padding:"12px 18px",fontSize:"18px",cursor:(!input.trim()||loading)?"not-allowed":"pointer",fontWeight:700,minWidth:"52px"}}>
                {loading?<span className="pulse">⏳</span>:"→"}
              </button>
            </div>
            {error&&<div style={{color:"#e53935",fontSize:"12px",padding:"4px 6px",marginBottom:"8px"}}>⚠️ {error}</div>}
            <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
              {!revCat&&<button onClick={()=>setRevCat(true)} className="chip" style={{background:"#fff8e1",color:"#f57f17",border:"1px solid #ffe082",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",fontWeight:600}}>🏷️ Ver Categoria</button>}
              {!hintUsed&&<button onClick={()=>setHintUsed(true)} className="chip" style={{background:"#f3e5f5",color:"#7b1fa2",border:"1px solid #ce93d8",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",fontWeight:600}}>💡 Ver Dica</button>}
              <button onClick={newGame} className="chip" style={{background:"#e0f2f1",color:"#00695c",border:"1px solid #80cbc4",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",fontWeight:600}}>🔄 Novo Jogo</button>
              <button onClick={()=>{sessionStorage.removeItem("pc_key");setApiKey("");}} className="chip" style={{background:"#fce4ec",color:"#c62828",border:"1px solid #f48fb1",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",fontWeight:600}}>🔑 Chave</button>
            </div>
          </div>
        )}

        {/* Guesses */}
        {guesses.length>0&&(
          <div className="card" style={{overflow:"hidden"}}>
            <div style={{padding:"11px 16px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fafafa"}}>
              <span style={{fontSize:"11px",fontWeight:700,color:"#546e7a",letterSpacing:"1.5px",textTransform:"uppercase"}}>Suas Tentativas</span>
              <span style={{fontSize:"12px",color:"#90a4ae",fontWeight:600}}>{guesses.length} palavra{guesses.length!==1?"s":""}</span>
            </div>
            {guesses.map((g,i)=>{
              const col = rankColor(g.rank);
              const isL = !!g.loading;
              return(
                <div key={g.pid||g.word+i} className="guess-row"
                  style={{padding:"10px 16px",borderBottom:i<guesses.length-1?"1px solid #f5f5f5":"none",display:"flex",alignItems:"center",gap:"10px",background:g.rank===1?"#f1f8e9":"white"}}>
                  <div style={{width:"30px",height:"30px",borderRadius:"50%",background:isL?"#e0e0e0":col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:800,color:"white",flexShrink:0}}>
                    {isL?<span className="pulse">?</span>:i+1}
                  </div>
                  <div style={{flex:"0 0 110px",minWidth:0,overflow:"hidden"}}>
                    <div style={{fontSize:"15px",fontWeight:700,color:g.rank===1?"#1b5e20":"#37474f",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {g.word}
                    </div>
                  </div>
                  <div style={{flex:1,display:"flex",flexDirection:"column",gap:"4px"}}>
                    <div style={{height:"9px",background:"#f0f0f0",borderRadius:"5px",overflow:"hidden"}}>
                      {isL
                        ?<div className="pulse" style={{height:"100%",width:"28%",background:"#cfd8dc",borderRadius:"5px"}}/>
                        :<div className="bar-fill" style={{height:"100%",width:`${barW(g.rank)}%`,background:col,borderRadius:"5px"}}/>
                      }
                    </div>
                    <div style={{fontSize:"11px",color:isL?"#b0bec5":col,fontWeight:600}}>
                      {isL?"avaliando...":heatLabel(g.rank)}
                    </div>
                  </div>
                  <div style={{flexShrink:0,minWidth:"44px",textAlign:"right",fontSize:"14px",fontWeight:800,color:isL?"#cfd8dc":col}}>
                    {isL?"...":g.rank===1?"#1":`#${g.rank}`}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Empty state */}
        {guesses.length===0&&!won&&(
          <div style={{textAlign:"center",padding:"36px 20px 20px"}}>
            <PantanalScene/>
            <div style={{fontSize:"17px",fontWeight:700,color:"#546e7a",marginBottom:"8px",marginTop:"18px"}}>
              Comece a explorar o Pantanal!
            </div>
            <div style={{fontSize:"13px",color:"#90a4ae",lineHeight:1.7}}>
              Digite qualquer palavra relacionada ao Pantanal.<br/>
              Quanto menor o número, mais próxima da resposta!<br/>
              <span style={{color:"#81c784"}}>#1 = acertou! &bull; #2000 = muito longe</span>
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:"8px",marginTop:"16px",flexWrap:"wrap"}}>
              {["capivara","onça","baía","pesca"].map(ex=>(
                <button key={ex} onClick={()=>{setInput(ex);inputRef.current?.focus();}}
                  style={{background:"#e8f5e9",color:"#2e7d32",border:"1px solid #a5d6a7",borderRadius:"20px",padding:"5px 14px",fontSize:"12px",fontWeight:600,cursor:"pointer"}}>
                  {ex}?
                </button>
              ))}
            </div>
          </div>
        )}

        <div style={{textAlign:"center",marginTop:"28px"}}>
          <p style={{fontSize:"11px",color:"#b0bec5"}}>
            🌿 Pantanal Contexto — Ferramenta educativa &bull; {WORD_BANK.length} palavras
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
